workflows:
  ios-debug:
    name: iOS Debug Build
    environment:
      xcode: 16.0
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build (no signing)
        script: |
          xcodebuild \
            -project MaimaiFisheyeStabilizer.xcodeproj \
            -scheme MaimaiFisheyeStabilizer \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build
    artifacts:
      - build/**/*.app
