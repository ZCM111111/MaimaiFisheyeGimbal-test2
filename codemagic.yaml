workflows:
  ios-debug:
    name: iOS Debug Build
    environment:
      xcode: 16.0
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Archive
        script: |
          xcodebuild \
            -project MaimaiFisheyeStabilizer.xcodeproj \
            -scheme MaimaiFisheyeStabilizer \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            -exportPath $CM_BUILD_DIR/output \
            -exportOptionsPlist exportOptions.plist
    artifacts:
      - output/*.ipa
