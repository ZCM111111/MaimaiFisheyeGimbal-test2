workflows:
  ios-debug:
    name: Debug Build + Unsigned IPA
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      xcode: "16.2"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
      cancel_previous_builds: true
    scripts:
      - name: Build for device (no code signing)
        script: |
          xcodebuild build \
            -project "Stable Action.xcodeproj" \
            -scheme "Stable Action" \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
      - name: Package unsigned IPA
        script: |
          APP_PATH=$(find $HOME/Library/Developer/Xcode/DerivedData -name "Stable Action.app" -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find built .app"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -R "$APP_PATH" $CM_BUILD_DIR/build/Payload/
          cd $CM_BUILD_DIR/build
          zip -r StableAction-unsigned.ipa Payload/
          ls -lh StableAction-unsigned.ipa
    artifacts:
      - build/StableAction-unsigned.ipa
