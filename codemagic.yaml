workflows:
  ios-debug:
    name: iOS Debug Build
    environment:
      xcode: 15.0
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build debug
        script: |
          xcodebuild \
            -project MaimaiFisheyeStabilizer.xcodeproj \
            -scheme MaimaiFisheyeStabilizer \
            -sdk iphoneos \
            -configuration Debug \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            archive
    artifacts:
      - build.xcarchive/**/*.app

  ios-release:
    name: iOS Release (TestFlight)
    environment:
      xcode: 15.0
      groups:
        - app_store_credentials
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          provisioning_profiles fetch

      - name: Build release
        script: |
          xcodebuild \
            -project MaimaiFisheyeStabilizer.xcodeproj \
            -scheme MaimaiFisheyeStabilizer \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            -exportPath $CM_BUILD_DIR/output \
            -exportOptionsPlist exportOptions.plist
    artifacts:
      - output/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        submit_to_testflight: true
