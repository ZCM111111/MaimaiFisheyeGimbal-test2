workflows:
  ios-debug:
    name: iOS Debug Build
    environment:
      xcode: 16.0
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build debug
        script: |
          xcodebuild \
            -project MaimaiFisheyeStabilizer.xcodeproj \
            -scheme MaimaiFisheyeStabilizer \
            -sdk iphoneos \
            -configuration Debug \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            archive
    artifacts:
      - build.xcarchive/**/*.app
