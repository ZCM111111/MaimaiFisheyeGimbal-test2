name: MaimaiFisheyeStabilizer
options:
  bundleIdPrefix: com.maimai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  swiftVersion: "5.9"

targets:
  MaimaiFisheyeStabilizer:
    type: application
    platform: iOS
    sources:
      - MaimaiFisheyeStabilizer
    settings:
      base:
        INFOPLIST_FILE: MaimaiFisheyeStabilizer/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.fisheye-stabilizer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []
